<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6af6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1535"/>
      <stop offset="100%" style="stop-color:#0f0d25"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#dark)"/>
  <!-- Icon inner rounded box -->
  <rect x="64" y="64" width="384" height="384" rx="72" fill="url(#bg)"/>
  <!-- Document icon: paper -->
  <rect x="152" y="128" width="208" height="256" rx="16" fill="white" fill-opacity="0.95"/>
  <!-- Fold corner -->
  <polygon points="296,128 360,192 296,192" fill="#7c6af6" fill-opacity="0.7"/>
  <!-- Lines -->
  <rect x="176" y="232" width="80" height="12" rx="6" fill="#7c6af6" fill-opacity="0.7"/>
  <rect x="176" y="260" width="120" height="12" rx="6" fill="#7c6af6" fill-opacity="0.5"/>
  <rect x="176" y="288" width="100" height="12" rx="6" fill="#7c6af6" fill-opacity="0.5"/>
  <!-- Checkmark circle -->
  <circle cx="300" cy="330" r="50" fill="#7c6af6"/>
  <polyline points="276,330 294,348 326,314" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
